<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scores Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: #0f0f1a;
            border-bottom: 1px solid #2a2a4a;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo .bolt {
            color: #f7c948;
            font-size: 28px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #4ade80;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .last-updated {
            font-size: 11px;
            color: #888;
        }

        .sport-tabs {
            background: #12122a;
            padding: 0 24px;
            display: flex;
            gap: 0;
            border-bottom: 2px solid #2a2a4a;
            overflow-x: auto;
        }

        .sport-tab {
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sport-tab:hover {
            color: #ccc;
            background: rgba(255,255,255,0.03);
        }

        .sport-tab.active {
            color: #f7c948;
            border-bottom-color: #f7c948;
        }

        .sport-tab .tab-icon {
            font-size: 18px;
        }

        .sport-tab .game-count {
            background: #2a2a4a;
            color: #aaa;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 500;
        }

        .sport-tab.active .game-count {
            background: rgba(247, 201, 72, 0.2);
            color: #f7c948;
        }

        .main-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: #12122a;
            border-radius: 8px 8px 0 0;
            border: 1px solid #2a2a4a;
            border-bottom: none;
        }

        .section-header .league-icon {
            width: 24px;
            height: 24px;
            background: #2a2a4a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .section-header .league-name {
            font-size: 13px;
            font-weight: 600;
            color: #ccc;
        }

        .section-header .league-country {
            font-size: 11px;
            color: #666;
            margin-left: auto;
        }

        .match-list {
            border: 1px solid #2a2a4a;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        .match-row {
            display: grid;
            grid-template-columns: 80px 1fr auto auto;
            align-items: center;
            padding: 12px 16px;
            background: #1e1e38;
            border-bottom: 1px solid #2a2a4a;
            transition: background 0.15s;
            cursor: pointer;
            gap: 8px;
        }

        .match-row:last-child {
            border-bottom: none;
        }

        .match-row:hover {
            background: #252548;
        }

        .match-status {
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .match-status.live {
            color: #ef4444;
        }

        .match-status.finished {
            color: #666;
        }

        .match-status.upcoming {
            color: #60a5fa;
        }

        .match-status .status-time {
            font-size: 11px;
            margin-top: 2px;
            color: #888;
        }

        .match-teams {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 16px;
        }

        .team-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .team-logo {
            width: 20px;
            height: 20px;
            border-radius: 2px;
        }

        .team-name {
            flex: 1;
            color: #e0e0e0;
        }

        .team-name.winner {
            color: #fff;
            font-weight: 600;
        }

        .match-scores {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
            min-width: 40px;
        }

        .score {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            min-width: 24px;
            text-align: center;
        }

        .score.live-score {
            color: #ef4444;
        }

        /* Odds styling */
        .match-odds {
            display: flex;
            gap: 6px;
            align-items: center;
            min-width: 200px;
            justify-content: flex-end;
        }

        .odds-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
        }

        .odds-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .odds-cell {
            background: #252548;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            color: #e0e0e0;
            text-align: center;
            min-width: 52px;
            transition: all 0.2s;
        }

        .odds-cell:hover {
            border-color: #f7c948;
            color: #f7c948;
        }

        .odds-cell.favorite {
            color: #4ade80;
        }

        .odds-cell.underdog {
            color: #f97316;
        }

        .odds-cell .odds-point {
            font-size: 10px;
            color: #888;
            display: block;
        }

        .odds-pair {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .odds-source {
            font-size: 9px;
            color: #555;
            text-align: center;
            margin-top: 2px;
        }

        .no-odds {
            font-size: 11px;
            color: #444;
            font-style: italic;
        }

        .tennis-scores {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tennis-score-row {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: flex-end;
        }

        .set-score {
            font-size: 12px;
            font-weight: 600;
            color: #aaa;
            width: 18px;
            text-align: center;
        }

        .set-score.current {
            color: #f7c948;
            font-weight: 700;
        }

        .set-score.won {
            color: #fff;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 12px 0;
            margin-bottom: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #888;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: #555;
            color: #ccc;
        }

        .filter-btn.active {
            background: #f7c948;
            color: #1a1a2e;
            border-color: #f7c948;
            font-weight: 600;
        }

        .odds-toggle {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .odds-toggle label {
            font-size: 12px;
            color: #888;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background: #2a2a4a;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: #f7c948;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch.active::after {
            transform: translateX(16px);
        }

        .no-matches {
            text-align: center;
            padding: 40px;
            color: #555;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a4a;
            border-top-color: #f7c948;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #f87171;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .serving-dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
        }

        .base-indicator {
            display: inline-flex;
            gap: 2px;
            margin-left: 6px;
        }

        .base {
            width: 8px;
            height: 8px;
            border: 1px solid #555;
            transform: rotate(45deg);
            background: transparent;
        }

        .base.occupied {
            background: #f7c948;
            border-color: #f7c948;
        }

        .outs-indicator {
            display: inline-flex;
            gap: 3px;
            margin-left: 8px;
        }

        .out-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            border: 1px solid #555;
            background: transparent;
        }

        .out-dot.active {
            background: #ef4444;
            border-color: #ef4444;
        }

        .live-badge {
            display: inline-block;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse 1.5s infinite;
        }

        .refresh-btn {
            background: none;
            border: 1px solid #2a2a4a;
            color: #888;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: #f7c948;
            color: #f7c948;
        }

        /* API Key setup banner */
        .api-key-banner {
            background: linear-gradient(135deg, #1e1e38, #252548);
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .api-key-banner.hidden {
            display: none;
        }

        .api-key-banner .banner-icon {
            font-size: 20px;
        }

        .api-key-banner .banner-text {
            flex: 1;
            min-width: 200px;
        }

        .api-key-banner .banner-text h3 {
            font-size: 13px;
            color: #f7c948;
            margin-bottom: 4px;
        }

        .api-key-banner .banner-text p {
            font-size: 11px;
            color: #888;
            line-height: 1.4;
        }

        .api-key-banner .banner-text a {
            color: #60a5fa;
            text-decoration: none;
        }

        .api-key-banner .banner-text a:hover {
            text-decoration: underline;
        }

        .api-key-input {
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 12px;
            color: #e0e0e0;
            width: 260px;
            outline: none;
            transition: border-color 0.2s;
        }

        .api-key-input:focus {
            border-color: #f7c948;
        }

        .api-key-save {
            background: #f7c948;
            color: #1a1a2e;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .api-key-save:hover {
            opacity: 0.9;
        }

        .api-key-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .api-key-status.connected {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .api-key-status.error {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .bovada-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            color: #888;
            background: #1a1a2e;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #2a2a4a;
        }

        @media (max-width: 768px) {
            .match-row {
                grid-template-columns: 65px 1fr auto;
                padding: 10px 12px;
            }

            .match-odds {
                display: none;
            }

            .match-row.show-odds-mobile {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 12px;
            }

            .sport-tab {
                padding: 12px 16px;
                font-size: 13px;
            }

            .header {
                padding: 10px 16px;
            }

            .api-key-banner {
                flex-direction: column;
                align-items: stretch;
            }

            .api-key-input {
                width: 100%;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a4a;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a5a;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span class="bolt">&#9889;</span>
            LiveScore Dashboard
        </div>
        <div class="header-right">
            <div class="live-indicator">
                <span class="live-dot"></span>
                Live
            </div>
            <button class="refresh-btn" onclick="fetchAllData()">&#8635; Refresh</button>
            <div class="last-updated" id="lastUpdated">Updated: --:--:--</div>
        </div>
    </div>

    <div class="sport-tabs">
        <div class="sport-tab active" data-sport="all">
            <span class="tab-icon">&#127942;</span>
            All Sports
            <span class="game-count" id="count-all">0</span>
        </div>
        <div class="sport-tab" data-sport="wnba">
            <span class="tab-icon">&#127936;</span>
            WNBA
            <span class="game-count" id="count-wnba">0</span>
        </div>
        <div class="sport-tab" data-sport="mlb">
            <span class="tab-icon">&#9918;</span>
            MLB
            <span class="game-count" id="count-mlb">0</span>
        </div>
        <div class="sport-tab" data-sport="nba-sl">
            <span class="tab-icon">&#127936;</span>
            NBA Summer League
            <span class="game-count" id="count-nba-sl">0</span>
        </div>
        <div class="sport-tab" data-sport="tennis">
            <span class="tab-icon">&#127934;</span>
            Tennis
            <span class="game-count" id="count-tennis">0</span>
        </div>
    </div>

    <div class="main-content">
        <!-- API Key Setup -->
        <div class="api-key-banner" id="apiKeyBanner">
            <span class="banner-icon">&#128273;</span>
            <div class="banner-text">
                <h3>Enable Bovada Betting Odds</h3>
                <p>Get a free API key from <a href="https://the-odds-api.com" target="_blank">the-odds-api.com</a> (500 free requests/month). Odds are sourced from Bovada, DraftKings, FanDuel, and more.</p>
            </div>
            <input type="text" class="api-key-input" id="oddsApiKey" placeholder="Paste your API key here...">
            <button class="api-key-save" onclick="saveApiKey()">Enable Odds</button>
            <span class="api-key-status" id="apiKeyStatus"></span>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="live">Live</button>
            <button class="filter-btn" data-filter="finished">Finished</button>
            <button class="filter-btn" data-filter="upcoming">Upcoming</button>
            <div class="odds-toggle" id="oddsToggle" style="display:none">
                <label>Show Odds</label>
                <div class="toggle-switch active" id="oddsSwitch" onclick="toggleOdds()"></div>
            </div>
        </div>

        <div id="matchContainer">
            <div class="loading">
                <div class="spinner"></div>
                Fetching live scores...
            </div>
        </div>
    </div>

    <script>
        // ESPN API endpoints
        const ESPN_ENDPOINTS = {
            wnba: 'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/scoreboard',
            mlb: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard',
            'nba-sl': 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba-summer-las-vegas/scoreboard',
            'tennis-atp': 'https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard',
            'tennis-wta': 'https://site.api.espn.com/apis/site/v2/sports/tennis/wta/scoreboard'
        };

        // The Odds API sport keys
        const ODDS_SPORT_KEYS = {
            wnba: 'basketball_wnba',
            mlb: 'baseball_mlb',
            'nba-sl': 'basketball_nba'  // Fall back to NBA if no summer league odds
        };

        let matchData = {};
        let oddsData = {};
        let activeSport = "all";
        let activeFilter = "all";
        let showOdds = true;
        let oddsApiKey = localStorage.getItem('odds_api_key') || '';

        // --- INIT ---
        if (oddsApiKey) {
            document.getElementById('apiKeyBanner').classList.add('hidden');
            document.getElementById('oddsToggle').style.display = 'flex';
            document.getElementById('oddsApiKey').value = oddsApiKey;
        }

        // --- API KEY MANAGEMENT ---

        function saveApiKey() {
            const key = document.getElementById('oddsApiKey').value.trim();
            if (!key) return;

            oddsApiKey = key;
            localStorage.setItem('odds_api_key', key);

            const status = document.getElementById('apiKeyStatus');
            status.textContent = 'Verifying...';
            status.className = 'api-key-status';

            // Test the key with a simple request
            fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${key}`)
                .then(r => {
                    if (!r.ok) throw new Error('Invalid key');
                    return r.json();
                })
                .then(() => {
                    status.textContent = 'Connected!';
                    status.className = 'api-key-status connected';
                    document.getElementById('apiKeyBanner').classList.add('hidden');
                    document.getElementById('oddsToggle').style.display = 'flex';
                    fetchOdds();
                })
                .catch(() => {
                    status.textContent = 'Invalid key';
                    status.className = 'api-key-status error';
                    oddsApiKey = '';
                    localStorage.removeItem('odds_api_key');
                });
        }

        function toggleOdds() {
            showOdds = !showOdds;
            document.getElementById('oddsSwitch').classList.toggle('active', showOdds);
            renderMatches();
        }

        // --- ODDS FETCHING ---

        async function fetchOdds() {
            if (!oddsApiKey) return;

            const sportKeys = ['basketball_wnba', 'baseball_mlb'];

            // Also discover tennis sport keys that are in-season
            try {
                const sportsRes = await fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${oddsApiKey}`);
                if (sportsRes.ok) {
                    const sports = await sportsRes.json();
                    sports.forEach(s => {
                        if (s.key.startsWith('tennis_') && s.active) {
                            sportKeys.push(s.key);
                        }
                    });
                }
            } catch (e) {
                console.error('Failed to fetch sports list:', e);
            }

            const fetches = sportKeys.map(async (sportKey) => {
                try {
                    const url = `https://api.the-odds-api.com/v4/sports/${sportKey}/odds/?apiKey=${oddsApiKey}&regions=us&markets=h2h,spreads,totals&oddsFormat=american&bookmakers=bovada,draftkings,fanduel`;
                    const res = await fetch(url);
                    if (!res.ok) return;
                    const data = await res.json();
                    data.forEach(event => {
                        const matchKey = normalizeTeamName(event.home_team) + '|' + normalizeTeamName(event.away_team);
                        oddsData[matchKey] = event;
                    });
                } catch (e) {
                    console.error(`Odds fetch error for ${sportKey}:`, e);
                }
            });

            await Promise.all(fetches);
            renderMatches();
        }

        function normalizeTeamName(name) {
            return name.toLowerCase()
                .replace(/[^a-z0-9]/g, '')
                .replace(/city$/, '')
                .replace(/^the/, '');
        }

        function findOddsForMatch(home, away) {
            const homeNorm = normalizeTeamName(home);
            const awayNorm = normalizeTeamName(away);

            // Try exact match first
            const key1 = homeNorm + '|' + awayNorm;
            if (oddsData[key1]) return oddsData[key1];

            // Try reversed
            const key2 = awayNorm + '|' + homeNorm;
            if (oddsData[key2]) return oddsData[key2];

            // Fuzzy match - check if team names are contained
            for (const [key, event] of Object.entries(oddsData)) {
                const eventHome = normalizeTeamName(event.home_team);
                const eventAway = normalizeTeamName(event.away_team);

                if ((homeNorm.includes(eventHome) || eventHome.includes(homeNorm)) &&
                    (awayNorm.includes(eventAway) || eventAway.includes(awayNorm))) {
                    return event;
                }
                if ((homeNorm.includes(eventAway) || eventAway.includes(homeNorm)) &&
                    (awayNorm.includes(eventHome) || eventHome.includes(awayNorm))) {
                    return event;
                }
            }

            return null;
        }

        function extractOdds(oddsEvent, homeTeam) {
            if (!oddsEvent || !oddsEvent.bookmakers || oddsEvent.bookmakers.length === 0) return null;

            // Prefer Bovada, then DraftKings, then FanDuel, then first available
            const preferred = ['bovada', 'draftkings', 'fanduel'];
            let bookmaker = null;
            for (const pref of preferred) {
                bookmaker = oddsEvent.bookmakers.find(b => b.key === pref);
                if (bookmaker) break;
            }
            if (!bookmaker) bookmaker = oddsEvent.bookmakers[0];

            const result = { source: bookmaker.title };

            bookmaker.markets.forEach(market => {
                if (market.key === 'h2h') {
                    result.moneyline = {};
                    market.outcomes.forEach(o => {
                        if (normalizeTeamName(o.name).includes(normalizeTeamName(homeTeam)) ||
                            normalizeTeamName(homeTeam).includes(normalizeTeamName(o.name))) {
                            result.moneyline.home = o.price;
                        } else {
                            result.moneyline.away = o.price;
                        }
                    });
                    // Fallback if fuzzy match didn't work
                    if (!result.moneyline.home && market.outcomes.length >= 2) {
                        if (normalizeTeamName(market.outcomes[0].name) === normalizeTeamName(oddsEvent.home_team)) {
                            result.moneyline.home = market.outcomes[0].price;
                            result.moneyline.away = market.outcomes[1].price;
                        } else {
                            result.moneyline.home = market.outcomes[1].price;
                            result.moneyline.away = market.outcomes[0].price;
                        }
                    }
                }
                if (market.key === 'spreads') {
                    result.spread = {};
                    market.outcomes.forEach(o => {
                        if (normalizeTeamName(o.name).includes(normalizeTeamName(homeTeam)) ||
                            normalizeTeamName(homeTeam).includes(normalizeTeamName(o.name))) {
                            result.spread.home = { price: o.price, point: o.point };
                        } else {
                            result.spread.away = { price: o.price, point: o.point };
                        }
                    });
                    if (!result.spread.home && market.outcomes.length >= 2) {
                        if (normalizeTeamName(market.outcomes[0].name) === normalizeTeamName(oddsEvent.home_team)) {
                            result.spread.home = { price: market.outcomes[0].price, point: market.outcomes[0].point };
                            result.spread.away = { price: market.outcomes[1].price, point: market.outcomes[1].point };
                        } else {
                            result.spread.home = { price: market.outcomes[1].price, point: market.outcomes[1].point };
                            result.spread.away = { price: market.outcomes[0].price, point: market.outcomes[0].point };
                        }
                    }
                }
                if (market.key === 'totals') {
                    result.total = {};
                    market.outcomes.forEach(o => {
                        if (o.name === 'Over') {
                            result.total.over = { price: o.price, point: o.point };
                        } else {
                            result.total.under = { price: o.price, point: o.point };
                        }
                    });
                }
            });

            return result;
        }

        function formatOdds(price) {
            if (price === undefined || price === null) return '-';
            return price > 0 ? `+${price}` : `${price}`;
        }

        // --- DATA FETCHING (ESPN) ---

        async function fetchJSON(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        function parseStatus(status) {
            const state = status.type.state;
            if (state === 'in') return 'live';
            if (state === 'post') return 'finished';
            return 'upcoming';
        }

        function parseBasketballGame(event) {
            const comp = event.competitions[0];
            const status = comp.status;
            const state = parseStatus(status);

            const home = comp.competitors.find(c => c.homeAway === 'home');
            const away = comp.competitors.find(c => c.homeAway === 'away');

            let timeDisplay = '';
            if (state === 'live') {
                timeDisplay = status.type.shortDetail || status.type.detail || '';
            } else if (state === 'finished') {
                timeDisplay = 'Final';
            } else {
                const d = new Date(event.date);
                timeDisplay = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            }

            return {
                status: state,
                time: timeDisplay,
                home: home.team.displayName,
                away: away.team.displayName,
                homeLogo: home.team.logo || '',
                awayLogo: away.team.logo || '',
                homeScore: state === 'upcoming' ? '-' : home.score,
                awayScore: state === 'upcoming' ? '-' : away.score,
                isLive: state === 'live',
                homeWin: state === 'finished' && home.winner,
                awayWin: state === 'finished' && away.winner
            };
        }

        function parseMLBGame(event) {
            const comp = event.competitions[0];
            const status = comp.status;
            const state = parseStatus(status);

            const home = comp.competitors.find(c => c.homeAway === 'home');
            const away = comp.competitors.find(c => c.homeAway === 'away');

            let timeDisplay = '';
            if (state === 'live') {
                timeDisplay = status.type.shortDetail || status.type.detail || '';
            } else if (state === 'finished') {
                timeDisplay = 'Final';
            } else {
                const d = new Date(event.date);
                timeDisplay = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            }

            const match = {
                status: state,
                time: timeDisplay,
                home: home.team.displayName,
                away: away.team.displayName,
                homeLogo: home.team.logo || '',
                awayLogo: away.team.logo || '',
                homeScore: state === 'upcoming' ? '-' : home.score,
                awayScore: state === 'upcoming' ? '-' : away.score,
                isLive: state === 'live',
                homeWin: state === 'finished' && home.winner,
                awayWin: state === 'finished' && away.winner
            };

            if (state === 'live' && comp.situation) {
                match.bases = [
                    !!comp.situation.onFirst,
                    !!comp.situation.onSecond,
                    !!comp.situation.onThird
                ];
                match.outs = comp.situation.outs || 0;
            }

            return match;
        }

        function parseTennisData(data) {
            const matches = [];
            if (!data.events) return matches;

            data.events.forEach(event => {
                const tournamentName = event.name || 'Tournament';
                const groupings = event.groupings || [];

                groupings.forEach(grouping => {
                    if (grouping.grouping && grouping.grouping.slug && grouping.grouping.slug.includes('doubles')) return;

                    const competitions = grouping.competitions || [];
                    competitions.forEach(comp => {
                        const status = comp.status;
                        const state = parseStatus(status);
                        const competitors = comp.competitors || [];
                        if (competitors.length < 2) return;

                        const p1 = competitors[0];
                        const p2 = competitors[1];

                        const p1Name = p1.athlete ? p1.athlete.shortName || p1.athlete.displayName : 'TBD';
                        const p2Name = p2.athlete ? p2.athlete.shortName || p2.athlete.displayName : 'TBD';

                        const p1Sets = (p1.linescores || []).map(s => Math.round(s.value));
                        const p2Sets = (p2.linescores || []).map(s => Math.round(s.value));

                        let timeDisplay = '';
                        if (state === 'live') {
                            const setNum = p1Sets.length;
                            timeDisplay = setNum > 0 ? `Set ${setNum}` : 'Live';
                        } else if (state === 'finished') {
                            timeDisplay = 'Finished';
                        } else {
                            const d = new Date(comp.startDate || comp.date);
                            timeDisplay = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                        }

                        const round = comp.round ? comp.round.displayName : '';

                        matches.push({
                            status: state,
                            time: timeDisplay,
                            home: p1Name,
                            away: p2Name,
                            isLive: state === 'live',
                            isTennis: true,
                            homeSets: p1Sets,
                            awaySets: p2Sets,
                            homeWin: state === 'finished' && p1.winner,
                            awayWin: state === 'finished' && p2.winner,
                            tournament: `${tournamentName}${round ? ' - ' + round : ''}`
                        });
                    });
                });
            });

            return matches;
        }

        async function fetchWNBA() {
            try {
                const data = await fetchJSON(ESPN_ENDPOINTS.wnba);
                matchData.wnba = {
                    league: 'WNBA',
                    country: 'USA',
                    icon: '&#127936;',
                    matches: (data.events || []).map(parseBasketballGame)
                };
            } catch (e) {
                matchData.wnba = { league: 'WNBA', country: 'USA', icon: '&#127936;', matches: [], error: e.message };
            }
        }

        async function fetchMLB() {
            try {
                const data = await fetchJSON(ESPN_ENDPOINTS.mlb);
                matchData.mlb = {
                    league: 'MLB',
                    country: 'USA',
                    icon: '&#9918;',
                    matches: (data.events || []).map(parseMLBGame)
                };
            } catch (e) {
                matchData.mlb = { league: 'MLB', country: 'USA', icon: '&#9918;', matches: [], error: e.message };
            }
        }

        async function fetchNBASummerLeague() {
            try {
                const data = await fetchJSON(ESPN_ENDPOINTS['nba-sl']);
                matchData['nba-sl'] = {
                    league: 'NBA Summer League',
                    country: 'Las Vegas',
                    icon: '&#127936;',
                    matches: (data.events || []).map(parseBasketballGame)
                };
            } catch (e) {
                matchData['nba-sl'] = { league: 'NBA Summer League', country: 'Las Vegas', icon: '&#127936;', matches: [], error: e.message };
            }
        }

        async function fetchTennis() {
            try {
                const [atpData, wtaData] = await Promise.all([
                    fetchJSON(ESPN_ENDPOINTS['tennis-atp']),
                    fetchJSON(ESPN_ENDPOINTS['tennis-wta'])
                ]);

                const allMatches = [...parseTennisData(atpData), ...parseTennisData(wtaData)];
                allMatches.sort((a, b) => {
                    const order = { live: 0, upcoming: 1, finished: 2 };
                    return (order[a.status] || 0) - (order[b.status] || 0);
                });

                matchData.tennis = {
                    league: 'ATP / WTA Tour',
                    country: 'International',
                    icon: '&#127934;',
                    matches: allMatches
                };
            } catch (e) {
                matchData.tennis = { league: 'ATP / WTA Tour', country: 'International', icon: '&#127934;', matches: [], error: e.message };
            }
        }

        async function fetchAllData() {
            renderLoading();

            await Promise.all([
                fetchWNBA(),
                fetchMLB(),
                fetchNBASummerLeague(),
                fetchTennis()
            ]);

            if (oddsApiKey) {
                await fetchOdds();
            } else {
                renderMatches();
            }

            updateTime();
        }

        // --- RENDERING ---

        function renderLoading() {
            document.getElementById('matchContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Fetching live scores...
                </div>
            `;
        }

        function renderMatches() {
            const container = document.getElementById("matchContainer");
            container.innerHTML = "";

            const sportsToShow = activeSport === "all"
                ? Object.keys(matchData)
                : [activeSport];

            let totalVisible = 0;

            sportsToShow.forEach(sportKey => {
                const sport = matchData[sportKey];
                if (!sport) return;

                if (sport.error && sport.matches.length === 0) {
                    container.innerHTML += `<div class="error-msg">Failed to load ${sport.league}: ${sport.error}</div>`;
                    return;
                }

                const filteredMatches = activeFilter === "all"
                    ? sport.matches
                    : sport.matches.filter(m => m.status === activeFilter);

                if (filteredMatches.length === 0) return;

                totalVisible += filteredMatches.length;

                const tournamentGroups = {};
                filteredMatches.forEach(match => {
                    const key = match.tournament || sport.league;
                    if (!tournamentGroups[key]) tournamentGroups[key] = [];
                    tournamentGroups[key].push(match);
                });

                Object.entries(tournamentGroups).forEach(([tournament, matches]) => {
                    const group = document.createElement("div");
                    group.className = "section";

                    group.innerHTML = `
                        <div class="section-header">
                            <div class="league-icon">${sport.icon}</div>
                            <div class="league-name">${tournament}</div>
                            <div class="league-country">${sport.country}</div>
                        </div>
                        <div class="match-list">
                            ${matches.map(match => renderMatchRow(match, sportKey)).join("")}
                        </div>
                    `;

                    container.appendChild(group);
                });
            });

            if (totalVisible === 0) {
                container.innerHTML += `<div class="no-matches">No matches found for this filter</div>`;
            }

            updateCounts();
        }

        function renderMatchRow(match, sportKey) {
            const statusClass = match.status;
            const statusText = match.isLive
                ? `<span class="live-badge">LIVE</span><div class="status-time">${match.time}</div>`
                : match.status === "finished"
                    ? "FT"
                    : match.time;

            if (match.isTennis) {
                return renderTennisRow(match, statusClass, statusText);
            }

            if (sportKey === "mlb" && match.isLive && match.bases) {
                return renderMLBRow(match, statusClass, statusText);
            }

            const homeLogoHTML = match.homeLogo ? `<img class="team-logo" src="${match.homeLogo}" alt="" onerror="this.style.display='none'">` : '';
            const awayLogoHTML = match.awayLogo ? `<img class="team-logo" src="${match.awayLogo}" alt="" onerror="this.style.display='none'">` : '';

            const oddsHTML = renderOddsCell(match);

            return `
                <div class="match-row" data-status="${match.status}">
                    <div class="match-status ${statusClass}">${statusText}</div>
                    <div class="match-teams">
                        <div class="team-row">
                            ${homeLogoHTML}
                            <span class="team-name ${match.homeWin ? 'winner' : ''}">${match.home}</span>
                        </div>
                        <div class="team-row">
                            ${awayLogoHTML}
                            <span class="team-name ${match.awayWin ? 'winner' : ''}">${match.away}</span>
                        </div>
                    </div>
                    <div class="match-scores">
                        <span class="score ${match.isLive ? 'live-score' : ''}">${match.homeScore}</span>
                        <span class="score ${match.isLive ? 'live-score' : ''}">${match.awayScore}</span>
                    </div>
                    ${oddsHTML}
                </div>
            `;
        }

        function renderTennisRow(match, statusClass, statusText) {
            const homeSetHTML = match.homeSets.map((s, i) => {
                const isLast = i === match.homeSets.length - 1 && match.isLive;
                const won = !match.isLive && s > (match.awaySets[i] || 0);
                return `<span class="set-score ${isLast ? 'current' : ''} ${won ? 'won' : ''}">${s}</span>`;
            }).join("");

            const awaySetHTML = match.awaySets.map((s, i) => {
                const isLast = i === match.awaySets.length - 1 && match.isLive;
                const won = !match.isLive && s > (match.homeSets[i] || 0);
                return `<span class="set-score ${isLast ? 'current' : ''} ${won ? 'won' : ''}">${s}</span>`;
            }).join("");

            const oddsHTML = renderOddsCell(match);

            return `
                <div class="match-row" data-status="${match.status}">
                    <div class="match-status ${statusClass}">${statusText}</div>
                    <div class="match-teams">
                        <div class="team-row">
                            <span class="team-name ${match.homeWin ? 'winner' : ''}">${match.home}</span>
                        </div>
                        <div class="team-row">
                            <span class="team-name ${match.awayWin ? 'winner' : ''}">${match.away}</span>
                        </div>
                    </div>
                    <div class="tennis-scores">
                        <div class="tennis-score-row">${homeSetHTML || '<span class="set-score">-</span>'}</div>
                        <div class="tennis-score-row">${awaySetHTML || '<span class="set-score">-</span>'}</div>
                    </div>
                    ${oddsHTML}
                </div>
            `;
        }

        function renderMLBRow(match, statusClass, statusText) {
            const basesHTML = match.bases ? `
                <span class="base-indicator">
                    <span class="base ${match.bases[0] ? 'occupied' : ''}"></span>
                    <span class="base ${match.bases[1] ? 'occupied' : ''}"></span>
                    <span class="base ${match.bases[2] ? 'occupied' : ''}"></span>
                </span>
            ` : "";

            const outsHTML = match.outs !== undefined ? `
                <span class="outs-indicator">
                    <span class="out-dot ${match.outs >= 1 ? 'active' : ''}"></span>
                    <span class="out-dot ${match.outs >= 2 ? 'active' : ''}"></span>
                </span>
            ` : "";

            const homeLogoHTML = match.homeLogo ? `<img class="team-logo" src="${match.homeLogo}" alt="" onerror="this.style.display='none'">` : '';
            const awayLogoHTML = match.awayLogo ? `<img class="team-logo" src="${match.awayLogo}" alt="" onerror="this.style.display='none'">` : '';

            const oddsHTML = renderOddsCell(match);

            return `
                <div class="match-row" data-status="${match.status}">
                    <div class="match-status ${statusClass}">
                        ${statusText}
                        <div style="margin-top:4px">${basesHTML}${outsHTML}</div>
                    </div>
                    <div class="match-teams">
                        <div class="team-row">
                            ${homeLogoHTML}
                            <span class="team-name">${match.home}</span>
                        </div>
                        <div class="team-row">
                            ${awayLogoHTML}
                            <span class="team-name">${match.away}</span>
                        </div>
                    </div>
                    <div class="match-scores">
                        <span class="score live-score">${match.homeScore}</span>
                        <span class="score live-score">${match.awayScore}</span>
                    </div>
                    ${oddsHTML}
                </div>
            `;
        }

        function renderOddsCell(match) {
            if (!showOdds || !oddsApiKey || match.status === 'finished') return '';

            const oddsEvent = findOddsForMatch(match.home, match.away);
            if (!oddsEvent) return '<div class="match-odds"><span class="no-odds">--</span></div>';

            const odds = extractOdds(oddsEvent, match.home);
            if (!odds) return '<div class="match-odds"><span class="no-odds">--</span></div>';

            let html = '<div class="match-odds">';

            // Moneyline
            if (odds.moneyline) {
                const homeClass = odds.moneyline.home < 0 ? 'favorite' : 'underdog';
                const awayClass = odds.moneyline.away < 0 ? 'favorite' : 'underdog';
                html += `
                    <div class="odds-group">
                        <span class="odds-label">ML</span>
                        <div class="odds-pair">
                            <div class="odds-cell ${homeClass}">${formatOdds(odds.moneyline.home)}</div>
                            <div class="odds-cell ${awayClass}">${formatOdds(odds.moneyline.away)}</div>
                        </div>
                    </div>
                `;
            }

            // Spread
            if (odds.spread && odds.spread.home) {
                const spreadSign = odds.spread.home.point > 0 ? '+' : '';
                const spreadSign2 = odds.spread.away ? (odds.spread.away.point > 0 ? '+' : '') : '';
                html += `
                    <div class="odds-group">
                        <span class="odds-label">Spread</span>
                        <div class="odds-pair">
                            <div class="odds-cell"><span class="odds-point">${spreadSign}${odds.spread.home.point}</span> ${formatOdds(odds.spread.home.price)}</div>
                            <div class="odds-cell"><span class="odds-point">${spreadSign2}${odds.spread.away ? odds.spread.away.point : ''}</span> ${formatOdds(odds.spread.away ? odds.spread.away.price : null)}</div>
                        </div>
                    </div>
                `;
            }

            // Total
            if (odds.total && odds.total.over) {
                html += `
                    <div class="odds-group">
                        <span class="odds-label">O/U ${odds.total.over.point}</span>
                        <div class="odds-pair">
                            <div class="odds-cell">O ${formatOdds(odds.total.over.price)}</div>
                            <div class="odds-cell">U ${formatOdds(odds.total.under ? odds.total.under.price : null)}</div>
                        </div>
                    </div>
                `;
            }

            html += `<div class="bovada-badge">${odds.source}</div>`;
            html += '</div>';
            return html;
        }

        function updateCounts() {
            let total = 0;
            Object.keys(matchData).forEach(key => {
                const count = matchData[key] ? matchData[key].matches.length : 0;
                total += count;
                const el = document.getElementById(`count-${key}`);
                if (el) el.textContent = count;
            });
            document.getElementById("count-all").textContent = total;
        }

        function updateTime() {
            const now = new Date();
            document.getElementById("lastUpdated").textContent =
                `Updated: ${now.toLocaleTimeString()}`;
        }

        // --- EVENT LISTENERS ---

        document.querySelectorAll(".sport-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".sport-tab").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                activeSport = tab.dataset.sport;
                renderMatches();
            });
        });

        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeFilter = btn.dataset.filter;
                renderMatches();
            });
        });

        // Allow pressing Enter in the API key input
        document.getElementById('oddsApiKey').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') saveApiKey();
        });

        // --- INIT & AUTO-REFRESH ---

        fetchAllData();

        // Refresh scores every 30s, odds every 2 minutes
        setInterval(async () => {
            await Promise.all([fetchWNBA(), fetchMLB(), fetchNBASummerLeague(), fetchTennis()]);
            renderMatches();
            updateTime();
        }, 30000);

        setInterval(() => {
            if (oddsApiKey) fetchOdds();
        }, 120000);
    </script>
</body>
