<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveScore Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: #0f0f1a;
            border-bottom: 1px solid #2a2a4a;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo .bolt { color: #f7c948; font-size: 26px; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #4ade80;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .last-updated { font-size: 11px; color: #888; }

        .user-btn {
            background: #252548;
            border: 1px solid #3a3a5a;
            color: #e0e0e0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-btn:hover { border-color: #f7c948; color: #f7c948; }

        .user-btn.logged-in { border-color: #4ade80; color: #4ade80; }

        .refresh-btn {
            background: none;
            border: 1px solid #2a2a4a;
            color: #888;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover { border-color: #f7c948; color: #f7c948; }

        /* Sport tabs with search */
        .sport-nav {
            background: #12122a;
            border-bottom: 2px solid #2a2a4a;
            padding: 10px 24px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search-input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 13px;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: #f7c948; }
        .search-input::placeholder { color: #555; }

        .sport-tabs {
            display: flex;
            gap: 0;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .sport-tab {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sport-tab:hover { color: #ccc; }
        .sport-tab.active { color: #f7c948; border-bottom-color: #f7c948; }

        .sport-tab .game-count {
            background: #2a2a4a;
            color: #aaa;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 8px;
        }

        .sport-tab.active .game-count {
            background: rgba(247, 201, 72, 0.2);
            color: #f7c948;
        }

        .main-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #888;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover { border-color: #555; color: #ccc; }

        .filter-btn.active {
            background: #f7c948;
            color: #1a1a2e;
            border-color: #f7c948;
            font-weight: 600;
        }

        .section { margin-bottom: 20px; }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            background: #12122a;
            border-radius: 8px 8px 0 0;
            border: 1px solid #2a2a4a;
            border-bottom: none;
        }

        .section-header .league-icon {
            width: 22px;
            height: 22px;
            background: #2a2a4a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .section-header .league-name { font-size: 12px; font-weight: 600; color: #ccc; }
        .section-header .league-country { font-size: 10px; color: #666; margin-left: auto; }

        .match-list {
            border: 1px solid #2a2a4a;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        .match-row {
            display: grid;
            grid-template-columns: 75px 1fr auto auto;
            align-items: center;
            padding: 10px 14px;
            background: #1e1e38;
            border-bottom: 1px solid #2a2a4a;
            transition: background 0.15s;
            cursor: pointer;
            gap: 6px;
            position: relative;
        }

        .match-row:last-child { border-bottom: none; }
        .match-row:hover { background: #252548; }

        .match-status { font-size: 11px; font-weight: 600; text-align: center; }
        .match-status.live { color: #ef4444; }
        .match-status.finished { color: #666; }
        .match-status.upcoming { color: #60a5fa; }
        .match-status .status-time { font-size: 10px; margin-top: 2px; color: #888; }

        .match-teams { display: flex; flex-direction: column; gap: 3px; padding: 0 12px; }

        .team-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }

        .team-logo { width: 18px; height: 18px; border-radius: 2px; }

        .team-name { flex: 1; color: #e0e0e0; }
        .team-name.winner { color: #fff; font-weight: 600; }

        .match-scores { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; min-width: 35px; }

        .score { font-size: 13px; font-weight: 700; color: #fff; min-width: 22px; text-align: center; }
        .score.live-score { color: #ef4444; }

        /* Odds */
        .match-odds {
            display: flex;
            gap: 5px;
            align-items: center;
            min-width: 160px;
            justify-content: flex-end;
        }

        .odds-group { display: flex; flex-direction: column; gap: 2px; align-items: center; }
        .odds-label { font-size: 8px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }

        .odds-cell {
            background: #252548;
            border: 1px solid #3a3a5a;
            border-radius: 3px;
            padding: 3px 6px;
            font-size: 10px;
            font-weight: 600;
            color: #e0e0e0;
            text-align: center;
            min-width: 44px;
        }

        .odds-cell.favorite { color: #4ade80; }
        .odds-cell.underdog { color: #f97316; }
        .odds-cell .odds-point { font-size: 9px; color: #888; display: block; }
        .odds-pair { display: flex; flex-direction: column; gap: 2px; }

        .dk-badge {
            font-size: 8px;
            color: #666;
            background: #1a1a2e;
            padding: 2px 5px;
            border-radius: 3px;
            border: 1px solid #2a2a4a;
        }

        /* Vote bar */
        .vote-container {
            position: absolute;
            bottom: 0;
            left: 75px;
            right: 0;
            height: 0;
            overflow: hidden;
            transition: height 0.3s ease;
            background: #151530;
            border-top: 1px solid #2a2a4a;
        }

        .match-row:hover .vote-container,
        .vote-container.active {
            height: 56px;
        }

        .vote-inner {
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vote-bar-wrap {
            flex: 1;
            height: 20px;
            background: #2a2a4a;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        .vote-bar-home {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #000;
            min-width: 30px;
        }

        .vote-bar-away {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #ef4444);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #000;
            min-width: 30px;
        }

        .vote-btn {
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #3a3a5a;
            background: #252548;
            color: #ccc;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vote-btn:hover { border-color: #f7c948; color: #f7c948; }
        .vote-btn.voted { background: #f7c948; color: #1a1a2e; border-color: #f7c948; }
        .vote-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .vote-count { font-size: 10px; color: #888; white-space: nowrap; }

        .vote-login-msg { font-size: 10px; color: #666; font-style: italic; }

        /* Tennis */
        .tennis-scores { display: flex; flex-direction: column; gap: 3px; }
        .tennis-score-row { display: flex; gap: 5px; align-items: center; justify-content: flex-end; }

        .set-score { font-size: 11px; font-weight: 600; color: #aaa; width: 16px; text-align: center; }
        .set-score.current { color: #f7c948; font-weight: 700; }
        .set-score.won { color: #fff; }

        /* MLB */
        .base-indicator { display: inline-flex; gap: 2px; margin-left: 4px; }
        .base { width: 7px; height: 7px; border: 1px solid #555; transform: rotate(45deg); background: transparent; }
        .base.occupied { background: #f7c948; border-color: #f7c948; }
        .outs-indicator { display: inline-flex; gap: 2px; margin-left: 6px; }
        .out-dot { width: 5px; height: 5px; border-radius: 50%; border: 1px solid #555; background: transparent; }
        .out-dot.active { background: #ef4444; border-color: #ef4444; }

        .live-badge {
            display: inline-block;
            background: #ef4444;
            color: #fff;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 4px;
            border-radius: 3px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        .no-matches { text-align: center; padding: 40px; color: #555; font-size: 13px; }

        .loading { text-align: center; padding: 50px; color: #666; }

        .loading .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #2a2a4a;
            border-top-color: #f7c948;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            padding: 10px 14px;
            color: #f87171;
            font-size: 12px;
            margin-bottom: 12px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            padding: 30px;
            width: 380px;
            max-width: 90vw;
        }

        .modal h2 { font-size: 18px; color: #fff; margin-bottom: 6px; }
        .modal p { font-size: 12px; color: #888; margin-bottom: 20px; }

        .modal-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a2a4a;
        }

        .modal-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .modal-tab.active { color: #f7c948; border-bottom-color: #f7c948; }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: #f7c948; }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #f7c948;
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 6px;
        }

        .submit-btn:hover { opacity: 0.9; }

        .google-btn {
            width: 100%;
            padding: 10px;
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .google-btn:hover { background: #f5f5f5; }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
        }

        .auth-error {
            color: #f87171;
            font-size: 11px;
            margin-top: 8px;
            min-height: 16px;
        }

        .user-menu {
            position: relative;
        }

        .user-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 6px;
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 8px 0;
            min-width: 160px;
            z-index: 200;
        }

        .user-dropdown.show { display: block; }

        .user-dropdown-item {
            padding: 8px 16px;
            font-size: 12px;
            color: #ccc;
            cursor: pointer;
            transition: background 0.15s;
        }

        .user-dropdown-item:hover { background: #252548; }
        .user-dropdown-item.danger { color: #f87171; }

        @media (max-width: 768px) {
            .match-row { grid-template-columns: 60px 1fr auto; padding: 8px 10px; }
            .match-odds { display: none; }
            .header { padding: 10px 14px; }
            .sport-nav { padding: 8px 14px; }
            .main-content { padding: 12px; }
            .logo { font-size: 18px; }
        }

        /* Admin */
        .admin-crown {
            color: #f7c948;
            font-size: 14px;
            margin-right: 2px;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: linear-gradient(135deg, #f7c948, #f59e0b);
            color: #1a1a2e;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-panel {
            background: linear-gradient(135deg, #1e1e38, #252548);
            border: 1px solid #f7c948;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }

        .admin-panel.show { display: block; }

        .admin-panel h3 {
            font-size: 13px;
            color: #f7c948;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .admin-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .admin-action-btn {
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #3a3a5a;
            background: #1a1a2e;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .admin-action-btn:hover { border-color: #f7c948; color: #f7c948; }
        .admin-action-btn.danger { border-color: #ef4444; color: #ef4444; }
        .admin-action-btn.danger:hover { background: #ef4444; color: #fff; }

        .announcement-bar {
            background: linear-gradient(90deg, #f7c948, #f59e0b);
            color: #1a1a2e;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .announcement-bar.show { display: flex; }

        .announcement-bar .close-ann {
            background: none;
            border: none;
            color: #1a1a2e;
            font-size: 16px;
            cursor: pointer;
            margin-left: 8px;
            opacity: 0.7;
        }

        .announcement-input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 12px;
            color: #e0e0e0;
            outline: none;
        }

        .announcement-input:focus { border-color: #f7c948; }

        .vote-user-badge {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-size: 9px;
            color: #f7c948;
        }

        .user-btn .crown-icon { font-size: 12px; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span class="bolt">&#9889;</span>
            LiveScore
        </div>
        <div class="header-right">
            <div class="live-indicator">
                <span class="live-dot"></span>
                Live
            </div>
            <button class="refresh-btn" onclick="fetchAllData()">&#8635;</button>
            <div class="last-updated" id="lastUpdated">--:--</div>
            <div class="user-menu">
                <button class="user-btn" id="userBtn" onclick="handleUserClick()">
                    <span id="userIcon">&#128100;</span>
                    <span id="userLabel">Sign In</span>
                </button>
                <div class="user-dropdown" id="userDropdown">
                    <div class="user-dropdown-item" id="userEmail"></div>
                    <div class="user-dropdown-item" id="adminLabel" style="display:none;color:#f7c948;font-weight:600">&#128081; Admin</div>
                    <div class="user-dropdown-item danger" onclick="signOutUser()">Sign Out</div>
                </div>
            </div>
        </div>
    </div>

    <div class="announcement-bar" id="announcementBar">
        <span id="announcementText"></span>
        <button class="close-ann" onclick="dismissAnnouncement()">&times;</button>
    </div>

    <div class="sport-nav">
        <div class="search-bar">
            <input type="text" class="search-input" id="sportSearch" placeholder="Search sports (NFL, NBA, Tennis, Soccer...)" oninput="filterSportTabs()">
        </div>
        <div class="sport-tabs" id="sportTabs"></div>
    </div>

    <div class="main-content">
        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel">
            <h3>&#128081; Admin Panel</h3>
            <div class="admin-actions">
                <button class="admin-action-btn" onclick="showAnnouncementInput()">&#128226; Post Announcement</button>
                <button class="admin-action-btn" onclick="clearAnnouncement()">Clear Announcement</button>
                <button class="admin-action-btn danger" onclick="resetAllVotes()">&#128465; Reset All Votes</button>
                <button class="admin-action-btn" onclick="exportVoteData()">&#128202; Export Vote Data</button>
            </div>
            <div id="announcementInputArea" style="display:none;margin-top:10px;gap:8px;align-items:center">
                <input type="text" class="announcement-input" id="announcementInput" placeholder="Type announcement message..." onkeypress="if(event.key==='Enter')postAnnouncement()">
                <button class="admin-action-btn" onclick="postAnnouncement()" style="border-color:#4ade80;color:#4ade80">Post</button>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="live">Live</button>
            <button class="filter-btn" data-filter="finished">Finished</button>
            <button class="filter-btn" data-filter="upcoming">Upcoming</button>
        </div>
        <div id="matchContainer">
            <div class="loading"><div class="spinner"></div>Fetching live scores...</div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal" style="position:relative">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2>Welcome</h2>

                    Continue with Google

    </div>

    <script>

        let matchData = {};

        // ===== SPORT TABS =====
        function renderSportTabs() {
            const container = document.getElementById('sportTabs');
            let html = `<div class="sport-tab active" data-sport="all" onclick="switchSport('all')">All <span class="game-count" id="count-all">0</span></div>`;

            ALL_SPORTS.forEach(s => {
                html += `<div class="sport-tab" data-sport="${s.key}" onclick="switchSport('${s.key}')">${s.icon} ${s.name} <span class="game-count" id="count-${s.key}">0</span></div>`;
            });

            container.innerHTML = html;
        }

        function filterSportTabs() {
            const query = document.getElementById('sportSearch').value.toLowerCase();
            document.querySelectorAll('.sport-tab').forEach(tab => {
                const sport = tab.dataset.sport;
                if (sport === 'all') {
                    tab.style.display = '';
                    return;
                }
                const sportDef = ALL_SPORTS.find(s => s.key === sport);
                if (!sportDef) { tab.style.display = ''; return; }

                const match = sportDef.name.toLowerCase().includes(query) ||
                              sportDef.category.toLowerCase().includes(query) ||
                              sportDef.key.toLowerCase().includes(query);
                tab.style.display = match || !query ? '' : 'none';
            });
        }

        function switchSport(key) {
            activeSport = key;
            document.querySelectorAll('.sport-tab').forEach(t => t.classList.toggle('active', t.dataset.sport === key));
            renderMatches();
        }

        // ===== DATA FETCHING =====
        async function fetchJSON(url) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 8000);
            try {
                const r = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            } catch (e) {
                clearTimeout(timeout);
                throw e;
            }
        }

        function parseStatus(status) {
            const state = status.type.state;
            if (state === 'in') return 'live';
            if (state === 'post') return 'finished';
            return 'upcoming';
        }

        function parseOdds(comp) {
            if (!comp.odds || !comp.odds.length) return null;
            const o = comp.odds[0];
            const result = { source: o.provider ? o.provider.name : 'DraftKings', spread: o.spread, overUnder: o.overUnder, details: o.details };

            if (o.moneyline) {
                result.moneyline = {
                    home: o.moneyline.home && o.moneyline.home.close ? o.moneyline.home.close.odds : null,
                    away: o.moneyline.away && o.moneyline.away.close ? o.moneyline.away.close.odds : null
                };
            }
            if (o.pointSpread) {
                result.pointSpread = {
                    home: { line: o.pointSpread.home?.close?.line || o.spread, odds: o.pointSpread.home?.close?.odds },
                    away: { line: o.pointSpread.away?.close?.line || (o.spread ? -o.spread : null), odds: o.pointSpread.away?.close?.odds }
                };
            }
            if (o.total) {
                result.total = {
                    over: { line: o.total.over?.close?.line || o.overUnder, odds: o.total.over?.close?.odds },
                    under: { line: o.total.under?.close?.line || o.overUnder, odds: o.total.under?.close?.odds }
                };
            }
            return result;
        }

        function parseStandardGame(event, sportKey) {
            const comp = event.competitions[0];
            const status = comp.status;
            const state = parseStatus(status);
            const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
            const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];

            let timeDisplay = '';
            if (state === 'live') timeDisplay = status.type.shortDetail || status.type.detail || 'Live';
            else if (state === 'finished') timeDisplay = status.type.detail || 'Final';
            else {
                const d = new Date(event.date);
                timeDisplay = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            }

            const match = {
                id: event.id,
                status: state,
                time: timeDisplay,
                home: home.team.displayName,
                away: away.team.displayName,
                homeLogo: home.team.logo || '',
                awayLogo: away.team.logo || '',
                homeScore: state === 'upcoming' ? '-' : home.score,
                awayScore: state === 'upcoming' ? '-' : away.score,
                isLive: state === 'live',
                homeWin: state === 'finished' && home.winner,
                awayWin: state === 'finished' && away.winner,
                odds: parseOdds(comp),
                sportKey: sportKey
            };

            if (state === 'live' && comp.situation && sportKey === 'mlb') {
                match.bases = [!!comp.situation.onFirst, !!comp.situation.onSecond, !!comp.situation.onThird];
                match.outs = comp.situation.outs || 0;
            }

            return match;
        }

        function parseTennisData(data, sportKey) {
            const matches = [];
            if (!data.events) return matches;

            data.events.forEach(event => {
                const name = event.name || 'Tournament';
                (event.groupings || []).forEach(g => {
                    if (g.grouping?.slug?.includes('doubles')) return;
                    (g.competitions || []).forEach(comp => {
                        const state = parseStatus(comp.status);
                        const cs = comp.competitors || [];
                        if (cs.length < 2) return;

                        const p1 = cs[0], p2 = cs[1];
                        const p1Name = p1.athlete?.shortName || p1.athlete?.displayName || 'TBD';
                        const p2Name = p2.athlete?.shortName || p2.athlete?.displayName || 'TBD';
                        const p1Sets = (p1.linescores || []).map(s => Math.round(s.value));
                        const p2Sets = (p2.linescores || []).map(s => Math.round(s.value));

                        let timeDisplay = '';
                        if (state === 'live') timeDisplay = p1Sets.length ? `Set ${p1Sets.length}` : 'Live';
                        else if (state === 'finished') timeDisplay = 'Final';
                        else {
                            const d = new Date(comp.startDate || comp.date);
                            timeDisplay = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                        }

                        const round = comp.round?.displayName || '';
                        matches.push({
                            id: comp.id,
                            status: state, time: timeDisplay,
                            home: p1Name, away: p2Name,
                            isLive: state === 'live', isTennis: true,
                            homeSets: p1Sets, awaySets: p2Sets,
                            homeWin: state === 'finished' && p1.winner,
                            awayWin: state === 'finished' && p2.winner,
                            tournament: `${name}${round ? ' - ' + round : ''}`,
                            odds: null, sportKey: sportKey
                        });
                    });
                });
            });
            return matches;
        }

        async function fetchSport(sport) {
            try {
                const url = `https://site.api.espn.com/apis/site/v2/sports/${sport.endpoint}`;
                const data = await fetchJSON(url);

                if (sport.isTennis) {
                    const matches = parseTennisData(data, sport.key);
                    matches.sort((a, b) => ({ live: 0, upcoming: 1, finished: 2 }[a.status] || 0) - ({ live: 0, upcoming: 1, finished: 2 }[b.status] || 0));
                    matchData[sport.key] = { league: sport.name, country: sport.category, icon: sport.icon, matches };
                } else {
                    const matches = (data.events || []).map(e => parseStandardGame(e, sport.key));
                    matchData[sport.key] = { league: sport.name, country: sport.category, icon: sport.icon, matches };
                }
            } catch (e) {
                matchData[sport.key] = { league: sport.name, country: sport.category, icon: sport.icon, matches: [], error: e.message };
            }
        }

        async function fetchAllData() {
            document.getElementById('matchContainer').innerHTML = '<div class="loading"><div class="spinner"></div>Fetching live scores...</div>';

            let loaded = 0;
            const promises = ALL_SPORTS.map(async s => {
                await fetchSport(s);
                loaded++;
                if (loaded === 3 || loaded === ALL_SPORTS.length) {
                    renderMatches();
                    updateCounts();
                }
            });

            await Promise.all(promises);
            renderMatches();
            updateTime();
            updateCounts();
        }

        // ===== VOTING =====
        function getMatchVoteKey(match) {
            return `${match.sportKey}_${match.id}`;
        }

        function castVote(matchId, sportKey, team) {
            if (!currentUser) { openModal(); return; }
            if (!firebaseReady) return;

            const key = `${sportKey}_${matchId}`;
            const voteData = {
                team,
                user: currentUser.uid,
                name: currentUser.displayName || currentUser.email.split('@')[0],
                isAdmin: isAdmin,
                timestamp: Date.now()
            };

            votesRef.child(key).child(currentUser.uid).set(voteData);
            userVotes[key] = team;
            renderMatches();
        }

        function loadVotes(matchKey, callback) {
            if (!firebaseReady || !votesRef) { callback({ home: 0, away: 0, adminPick: null }); return; }

            votesRef.child(matchKey).once('value', snap => {
                const votes = snap.val() || {};
                let home = 0, away = 0, adminPick = null;
                Object.values(votes).forEach(v => {
                    if (v.team === 'home') home++;
                    else away++;
                    if (v.isAdmin) adminPick = v.team;
                });
                callback({ home, away, adminPick });
            });
        }

        function loadUserVotes() {
            if (!firebaseReady || !currentUser || !votesRef) return;

            votesRef.orderByChild('user').equalTo(currentUser.uid).once('value', snap => {
                // This won't work with nested structure, so we'll load per-match instead
            });
        }

        // ===== AUTH =====
        function handleUserClick() {
            if (currentUser) {
                document.getElementById('userDropdown').classList.toggle('show');
            } else {
                openModal();
            }
        }

        function openModal() { document.getElementById('authModal').classList.add('show'); }
        function closeModal() { document.getElementById('authModal').classList.remove('show'); }

        function switchAuthTab(mode) {
            authMode = mode;
            document.querySelectorAll('.modal-tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && mode === 'login') || (i === 1 && mode === 'signup')));
            document.getElementById('nameGroup').style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById('authSubmit').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
            document.getElementById('authError').textContent = '';
        }

        async function submitAuth() {
            if (!firebaseReady) {
                document.getElementById('authError').textContent = 'Firebase not configured. See instructions in source code.';
                return;
            }

            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPassword').value;
            const errEl = document.getElementById('authError');
            errEl.textContent = '';

            try {
                if (authMode === 'login') {
                    await firebase.auth().signInWithEmailAndPassword(email, pass);
                } else {
                    const name = document.getElementById('authName').value.trim();
                    const cred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
                    if (name) await cred.user.updateProfile({ displayName: name });
                }
                closeModal();
            } catch (e) {
                errEl.textContent = e.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/, '');
            }
        }

        async function googleSignIn() {
            if (!firebaseReady) {
                document.getElementById('authError').textContent = 'Firebase not configured. See instructions in source code.';
                return;
            }
            try {
                await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
                closeModal();
            } catch (e) {
                document.getElementById('authError').textContent = e.message.replace('Firebase: ', '');
            }
        }

        function signOutUser() {
            if (firebaseReady) firebase.auth().signOut();
            currentUser = null;
            userVotes = {};
            document.getElementById('userDropdown').classList.remove('show');
            updateUserUI();
            renderMatches();

        function updateUserUI() {
            const btn = document.getElementById('userBtn');
            const label = document.getElementById('userLabel');
            const emailEl = document.getElementById('userEmail');
            const iconEl = document.getElementById('userIcon');
            const adminPanel = document.getElementById('adminPanel');

            const adminLabelEl = document.getElementById('adminLabel');

            if (currentUser) {
                const displayName = currentUser.displayName || currentUser.email.split('@')[0];
                if (isAdmin) {
                    iconEl.innerHTML = '<span class="crown-icon">&#128081;</span>';
                    label.textContent = displayName;
                    btn.classList.add('logged-in');
                    btn.style.borderColor = '#f7c948';
                    btn.style.color = '#f7c948';
                    adminPanel.classList.add('show');
                    adminLabelEl.style.display = 'block';
                } else {
                    iconEl.innerHTML = '&#128100;';
                    label.textContent = displayName;
                    btn.classList.add('logged-in');
                    btn.style.borderColor = '';
                    btn.style.color = '';
                    adminPanel.classList.remove('show');
                    adminLabelEl.style.display = 'none';
                }
                emailEl.textContent = currentUser.email;
            } else {
                iconEl.innerHTML = '&#128100;';
                label.textContent = 'Sign In';
                btn.classList.remove('logged-in');
                btn.style.borderColor = '';
                btn.style.color = '';
                adminPanel.classList.remove('show');
                adminLabelEl.style.display = 'none';
            }
        }

        // Close dropdown on outside click
        document.addEventListener('click', e => {
            if (!e.target.closest('.user-menu')) {
                document.getElementById('userDropdown').classList.remove('show');

        // ===== RENDERING =====
        function renderMatches() {
            const container = document.getElementById('matchContainer');
            container.innerHTML = '';

            const sportsToShow = activeSport === 'all' ? ALL_SPORTS.map(s => s.key) : [activeSport];
            let totalVisible = 0;

            sportsToShow.forEach(sportKey => {
                const sport = matchData[sportKey];
                if (!sport) return;

                if (sport.error && !sport.matches.length) {
                    if (activeSport !== 'all') container.innerHTML += `<div class="error-msg">Failed to load ${sport.league}: ${sport.error}</div>`;
                    return;
                }

                const filtered = activeFilter === 'all' ? sport.matches : sport.matches.filter(m => m.status === activeFilter);
                if (!filtered.length) return;

                totalVisible += filtered.length;

                const groups = {};
                filtered.forEach(m => {
                    const k = m.tournament || sport.league;
                    if (!groups[k]) groups[k] = [];
                    groups[k].push(m);
                });

                Object.entries(groups).forEach(([tournament, matches]) => {
                    const sec = document.createElement('div');
                    sec.className = 'section';
                    sec.innerHTML = `
                        <div class="section-header">
                            <div class="league-icon">${sport.icon}</div>
                            <div class="league-name">${tournament}</div>
                            <div class="league-country">${sport.country}</div>
                        </div>
                        <div class="match-list">${matches.map(m => renderMatchRow(m)).join('')}</div>
                    `;
                    container.appendChild(sec);
                });
            });

            if (!totalVisible) container.innerHTML = '<div class="no-matches">No matches found</div>';

            // Load votes for visible live/upcoming matches
            document.querySelectorAll('.vote-container[data-votekey]').forEach(el => {
                const key = el.dataset.votekey;
                loadVotes(key, counts => {
                    const total = counts.home + counts.away || 1;
                    const homePct = Math.round((counts.home / total) * 100);
                    const awayPct = 100 - homePct;
                    const homeBar = el.querySelector('.vote-bar-home');
                    const awayBar = el.querySelector('.vote-bar-away');
                    const countEl = el.querySelector('.vote-count');
                    if (homeBar) homeBar.style.width = `${homePct}%`;
                    if (awayBar) awayBar.style.width = `${awayPct}%`;
                    if (homeBar) homeBar.textContent = counts.home ? `${homePct}%` : '';
                    if (awayBar) awayBar.textContent = counts.away ? `${awayPct}%` : '';
                    if (countEl) {
                        let txt = `${counts.home + counts.away} votes`;
                        if (counts.adminPick) {
                            txt += counts.adminPick === 'home' ? '  &#128081; Admin picks Home' : '  &#128081; Admin picks Away';
                        }
                        countEl.innerHTML = txt;
                    }
                });
            });
        }

        function renderMatchRow(match) {
            const sc = match.status;
            const statusText = match.isLive
                ? `<span class="live-badge">LIVE</span><div class="status-time">${match.time}</div>`
                : sc === 'finished' ? match.time : match.time;

            if (match.isTennis) return renderTennisRow(match, sc, statusText);

            const homeLogoHTML = match.homeLogo ? `<img class="team-logo" src="${match.homeLogo}" alt="" onerror="this.style.display='none'">` : '';
            const awayLogoHTML = match.awayLogo ? `<img class="team-logo" src="${match.awayLogo}" alt="" onerror="this.style.display='none'">` : '';
            const oddsHTML = renderOddsCell(match);
            const voteHTML = (sc === 'live' || sc === 'upcoming') ? renderVoteBar(match) : '';

            const basesHTML = match.bases ? `<div style="margin-top:3px"><span class="base-indicator"><span class="base ${match.bases[0]?'occupied':''}"></span><span class="base ${match.bases[1]?'occupied':''}"></span><span class="base ${match.bases[2]?'occupied':''}"></span></span><span class="outs-indicator"><span class="out-dot ${match.outs>=1?'active':''}"></span><span class="out-dot ${match.outs>=2?'active':''}"></span></span></div>` : '';

            return `
                <div class="match-row" data-status="${sc}">
                    <div class="match-status ${sc}">${statusText}${basesHTML}</div>
                    <div class="match-teams">
                        <div class="team-row">${homeLogoHTML}<span class="team-name ${match.homeWin?'winner':''}">${match.home}</span></div>
                        <div class="team-row">${awayLogoHTML}<span class="team-name ${match.awayWin?'winner':''}">${match.away}</span></div>
                    </div>
                    <div class="match-scores">
                        <span class="score ${match.isLive?'live-score':''}">${match.homeScore}</span>
                        <span class="score ${match.isLive?'live-score':''}">${match.awayScore}</span>
                    </div>
                    ${oddsHTML}
                    ${voteHTML}
                </div>
            `;
        }

        function renderTennisRow(match, sc, statusText) {
            const homeSetHTML = match.homeSets.map((s, i) => {
                const isLast = i === match.homeSets.length - 1 && match.isLive;
                const won = !match.isLive && s > (match.awaySets[i] || 0);
                return `<span class="set-score ${isLast?'current':''} ${won?'won':''}">${s}</span>`;
            }).join('');

            const awaySetHTML = match.awaySets.map((s, i) => {
                const isLast = i === match.awaySets.length - 1 && match.isLive;
                const won = !match.isLive && s > (match.homeSets[i] || 0);
                return `<span class="set-score ${isLast?'current':''} ${won?'won':''}">${s}</span>`;
            }).join('');

            const voteHTML = (sc === 'live' || sc === 'upcoming') ? renderVoteBar(match) : '';

            return `
                <div class="match-row" data-status="${sc}">
                    <div class="match-status ${sc}">${statusText}</div>
                    <div class="match-teams">
                        <div class="team-row"><span class="team-name ${match.homeWin?'winner':''}">${match.home}</span></div>
                        <div class="team-row"><span class="team-name ${match.awayWin?'winner':''}">${match.away}</span></div>
                    </div>
                    <div class="tennis-scores">
                        <div class="tennis-score-row">${homeSetHTML || '<span class="set-score">-</span>'}</div>
                        <div class="tennis-score-row">${awaySetHTML || '<span class="set-score">-</span>'}</div>
                    </div>
                    ${voteHTML}
                </div>
            `;
        }

        function renderOddsCell(match) {
            if (!match.odds || match.status === 'finished') return '';
            const o = match.odds;
            let html = '<div class="match-odds">';

            if (o.moneyline && (o.moneyline.home || o.moneyline.away)) {
                const hc = o.moneyline.home && parseInt(o.moneyline.home) < 0 ? 'favorite' : 'underdog';
                const ac = o.moneyline.away && parseInt(o.moneyline.away) < 0 ? 'favorite' : 'underdog';
                html += `<div class="odds-group"><span class="odds-label">ML</span><div class="odds-pair"><div class="odds-cell ${hc}">${fmtOdds(o.moneyline.home)}</div><div class="odds-cell ${ac}">${fmtOdds(o.moneyline.away)}</div></div></div>`;
            }

            if (o.pointSpread?.home) {
                html += `<div class="odds-group"><span class="odds-label">Spread</span><div class="odds-pair"><div class="odds-cell"><span class="odds-point">${fmtSpread(o.pointSpread.home.line)}</span>${fmtOdds(o.pointSpread.home.odds)}</div><div class="odds-cell"><span class="odds-point">${fmtSpread(o.pointSpread.away?.line)}</span>${fmtOdds(o.pointSpread.away?.odds)}</div></div></div>`;
            } else if (o.spread) {
                html += `<div class="odds-group"><span class="odds-label">Spread</span><div class="odds-pair"><div class="odds-cell">${fmtSpread(o.spread)}</div><div class="odds-cell">${fmtSpread(-o.spread)}</div></div></div>`;
            }

            if (o.total?.over) {
                html += `<div class="odds-group"><span class="odds-label">O/U ${o.total.over.line||o.overUnder||''}</span><div class="odds-pair"><div class="odds-cell">O${fmtOdds(o.total.over.odds)}</div><div class="odds-cell">U${fmtOdds(o.total.under?.odds)}</div></div></div>`;
            } else if (o.overUnder) {
                html += `<div class="odds-group"><span class="odds-label">O/U</span><div class="odds-pair"><div class="odds-cell">${o.overUnder}</div></div></div>`;
            }

            html += `<div class="dk-badge">${o.source}</div></div>`;
            return html;
        }

        function renderVoteBar(match) {
            const voteKey = getMatchVoteKey(match);
            const myVote = userVotes[voteKey] || '';

            return `
                <div class="vote-container" data-votekey="${voteKey}">
                    <div class="vote-inner">
                        <button class="vote-btn ${myVote==='home'?'voted':''}" onclick="event.stopPropagation();castVote('${match.id}','${match.sportKey}','home')" ${myVote?'disabled':''}>${match.home.split(' ').pop()}</button>
                        <div class="vote-bar-wrap">
                            <div class="vote-bar-home" style="width:50%">-</div>
                            <div class="vote-bar-away" style="width:50%">-</div>
                        </div>
                        <button class="vote-btn ${myVote==='away'?'voted':''}" onclick="event.stopPropagation();castVote('${match.id}','${match.sportKey}','away')" ${myVote?'disabled':''}>${match.away.split(' ').pop()}</button>
                        <span class="vote-count">loading...</span>
                    </div>
                </div>
            `;
        }

        function fmtOdds(v) {
            if (v === null || v === undefined) return '';
            const n = parseInt(v);
            if (isNaN(n)) return v;
            return n > 0 ? `+${n}` : `${n}`;
        }

        function fmtSpread(v) {
            if (v === null || v === undefined) return '-';
            const n = parseFloat(v);
            if (isNaN(n)) return v;
            return n > 0 ? `+${n}` : `${n}`;
        }

        function updateCounts() {
            let total = 0;
            ALL_SPORTS.forEach(s => {
                const count = matchData[s.key]?.matches?.length || 0;
                total += count;
                const el = document.getElementById(`count-${s.key}`);
                if (el) el.textContent = count || '';
            });
            document.getElementById('count-all').textContent = total;
        }

        function updateTime() {
            document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', second: '2-digit' });
        }

        // ===== ADMIN FUNCTIONS =====
        function showAnnouncementInput() {
            const area = document.getElementById('announcementInputArea');
            area.style.display = area.style.display === 'none' ? 'flex' : 'none';
            if (area.style.display === 'flex') document.getElementById('announcementInput').focus();
        }

        function postAnnouncement() {
            if (!isAdmin || !firebaseReady) return;
            const msg = document.getElementById('announcementInput').value.trim();
            if (!msg) return;
            announcementRef.set({ text: msg, timestamp: Date.now(), by: currentUser.displayName || 'Admin' });
            document.getElementById('announcementInput').value = '';
            document.getElementById('announcementInputArea').style.display = 'none';
            loadAnnouncement();
        }

        function clearAnnouncement() {
            if (!isAdmin || !firebaseReady) return;
            announcementRef.remove();
            document.getElementById('announcementBar').classList.remove('show');
        }

        function loadAnnouncement() {
            if (!firebaseReady || !announcementRef) return;
            announcementRef.on('value', snap => {
                const data = snap.val();
                const bar = document.getElementById('announcementBar');
                const text = document.getElementById('announcementText');
                if (data && data.text) {
                    text.innerHTML = `&#128226; ${data.text}`;
                    bar.classList.add('show');
                } else {
                    bar.classList.remove('show');
                }
            });
        }

        function dismissAnnouncement() {
            document.getElementById('announcementBar').classList.remove('show');
        }

        function resetAllVotes() {
            if (!isAdmin || !firebaseReady) return;
            if (!confirm('Are you sure you want to reset ALL votes? This cannot be undone.')) return;
            votesRef.remove();
            userVotes = {};
            renderMatches();
        }

        function exportVoteData() {
            if (!isAdmin || !firebaseReady) return;
            votesRef.once('value', snap => {
                const data = snap.val() || {};
                const summary = [];
                Object.entries(data).forEach(([matchKey, votes]) => {
                    let home = 0, away = 0;
                    Object.values(votes).forEach(v => {
                        if (v.team === 'home') home++;
                        else away++;
                    });
                    summary.push({ match: matchKey, homeVotes: home, awayVotes: away, total: home + away });
                });
                const blob = new Blob([JSON.stringify(summary, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `vote-data-${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        // ===== EVENT LISTENERS =====
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                renderMatches();
            });
        });

        // ===== INIT =====
        renderSportTabs();
        fetchAllData();
        setInterval(fetchAllData, 30000);
    </script>
</body>
</html>
