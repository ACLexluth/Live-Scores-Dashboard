<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scores Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: #0f0f1a;
            border-bottom: 1px solid #2a2a4a;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo .bolt {
            color: #f7c948;
            font-size: 28px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #4ade80;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .last-updated {
            font-size: 11px;
            color: #888;
        }

        .sport-tabs {
            background: #12122a;
            padding: 0 24px;
            display: flex;
            gap: 0;
            border-bottom: 2px solid #2a2a4a;
            overflow-x: auto;
        }

        .sport-tab {
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sport-tab:hover {
            color: #ccc;
            background: rgba(255,255,255,0.03);
        }

        .sport-tab.active {
            color: #f7c948;
            border-bottom-color: #f7c948;
        }

        .sport-tab .tab-icon {
            font-size: 18px;
        }

        .sport-tab .game-count {
            background: #2a2a4a;
            color: #aaa;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 500;
        }

        .sport-tab.active .game-count {
            background: rgba(247, 201, 72, 0.2);
            color: #f7c948;
        }

        .main-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: #12122a;
            border-radius: 8px 8px 0 0;
            border: 1px solid #2a2a4a;
            border-bottom: none;
        }

        .section-header .league-icon {
            width: 24px;
            height: 24px;
            background: #2a2a4a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .section-header .league-name {
            font-size: 13px;
            font-weight: 600;
            color: #ccc;
        }

        .section-header .league-country {
            font-size: 11px;
            color: #666;
            margin-left: auto;
        }

        .match-list {
            border: 1px solid #2a2a4a;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        .match-row {
            display: grid;
            grid-template-columns: 80px 1fr auto auto;
            align-items: center;
            padding: 12px 16px;
            background: #1e1e38;
            border-bottom: 1px solid #2a2a4a;
            transition: background 0.15s;
            cursor: pointer;
            gap: 8px;
        }

        .match-row:last-child {
            border-bottom: none;
        }

        .match-row:hover {
            background: #252548;
        }

        .match-status {
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .match-status.live {
            color: #ef4444;
        }

        .match-status.finished {
            color: #666;
        }

        .match-status.upcoming {
            color: #60a5fa;
        }

        .match-status .status-time {
            font-size: 11px;
            margin-top: 2px;
            color: #888;
        }

        .match-teams {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 16px;
        }

        .team-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .team-logo {
            width: 20px;
            height: 20px;
            border-radius: 2px;
        }

        .team-name {
            flex: 1;
            color: #e0e0e0;
        }

        .team-name.winner {
            color: #fff;
            font-weight: 600;
        }

        .match-scores {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
            min-width: 40px;
        }

        .score {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            min-width: 24px;
            text-align: center;
        }

        .score.live-score {
            color: #ef4444;
        }

        /* Odds styling */
        .match-odds {
            display: flex;
            gap: 6px;
            align-items: center;
            min-width: 180px;
            justify-content: flex-end;
        }

        .odds-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
        }

        .odds-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .odds-cell {
            background: #252548;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            color: #e0e0e0;
            text-align: center;
            min-width: 52px;
            transition: all 0.2s;
        }

        .odds-cell:hover {
            border-color: #f7c948;
            color: #f7c948;
        }

        .odds-cell.favorite {
            color: #4ade80;
        }

        .odds-cell.underdog {
            color: #f97316;
        }

        .odds-cell .odds-point {
            font-size: 10px;
            color: #888;
            display: block;
        }

        .odds-pair {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .odds-source {
            font-size: 9px;
            color: #555;
            text-align: center;
            margin-top: 2px;
        }

        .no-odds {
            font-size: 11px;
            color: #444;
            font-style: italic;
        }

        .dk-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            color: #888;
            background: #1a1a2e;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #2a2a4a;
        }

        .tennis-scores {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tennis-score-row {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: flex-end;
        }

        .set-score {
            font-size: 12px;
            font-weight: 600;
            color: #aaa;
            width: 18px;
            text-align: center;
        }

        .set-score.current {
            color: #f7c948;
            font-weight: 700;
        }

        .set-score.won {
            color: #fff;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 12px 0;
            margin-bottom: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #888;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: #555;
            color: #ccc;
        }

        .filter-btn.active {
            background: #f7c948;
            color: #1a1a2e;
            border-color: #f7c948;
            font-weight: 600;
        }

        .odds-toggle {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .odds-toggle label {
            font-size: 12px;
            color: #888;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background: #2a2a4a;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: #f7c948;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch.active::after {
            transform: translateX(16px);
        }

        .no-matches {
            text-align: center;
            padding: 40px;
            color: #555;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a4a;
            border-top-color: #f7c948;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #f87171;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .serving-dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
        }

        .base-indicator {
            display: inline-flex;
            gap: 2px;
            margin-left: 6px;
        }

        .base {
            width: 8px;
            height: 8px;
            border: 1px solid #555;
            transform: rotate(45deg);
            background: transparent;
        }

        .base.occupied {
            background: #f7c948;
            border-color: #f7c948;
        }

        .outs-indicator {
            display: inline-flex;
            gap: 3px;
            margin-left: 8px;
        }

        .out-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            border: 1px solid #555;
            background: transparent;
        }

        .out-dot.active {
            background: #ef4444;
            border-color: #ef4444;
        }

        .live-badge {
            display: inline-block;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse 1.5s infinite;
        }

        .refresh-btn {
            background: none;
            border: 1px solid #2a2a4a;
            color: #888;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: #f7c948;
            color: #f7c948;
        }

        @media (max-width: 768px) {
            .match-row {
                grid-template-columns: 65px 1fr auto;
                padding: 10px 12px;
            }

            .match-odds {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 12px;
            }

            .sport-tab {
                padding: 12px 16px;
                font-size: 13px;
            }

            .header {
                padding: 10px 16px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a4a;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a5a;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span class="bolt">&#9889;</span>
            LiveScore Dashboard
        </div>
        <div class="header-right">
            <div class="live-indicator">
                <span class="live-dot"></span>
                Live
            </div>
            <button class="refresh-btn" onclick="fetchAllData()">&#8635; Refresh</button>
            <div class="last-updated" id="lastUpdated">Updated: --:--:--</div>
        </div>
    </div>

    <div class="sport-tabs">
        <div class="sport-tab active" data-sport="all">
            <span class="tab-icon">&#127942;</span>
            All Sports
            <span class="game-count" id="count-all">0</span>
        </div>
        <div class="sport-tab" data-sport="wnba">
            <span class="tab-icon">&#127936;</span>
            WNBA
            <span class="game-count" id="count-wnba">0</span>
        </div>
        <div class="sport-tab" data-sport="mlb">
            <span class="tab-icon">&#9918;</span>
            MLB
            <span class="game-count" id="count-mlb">0</span>
        </div>
        <div class="sport-tab" data-sport="nba-sl">
            <span class="tab-icon">&#127936;</span>
            NBA Summer League
            <span class="game-count" id="count-nba-sl">0</span>
        </div>
        <div class="sport-tab" data-sport="tennis">
            <span class="tab-icon">&#127934;</span>
            Tennis
            <span class="game-count" id="count-tennis">0</span>
        </div>
    </div>

    <div class="main-content">
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="live">Live</button>
            <button class="filter-btn" data-filter="finished">Finished</button>
            <button class="filter-btn" data-filter="upcoming">Upcoming</button>
            <div class="odds-toggle">
                <label>Show Odds</label>
                <div class="toggle-switch active" id="oddsSwitch" onclick="toggleOdds()"></div>
            </div>
        </div>

        <div id="matchContainer">
            <div class="loading">
                <div class="spinner"></div>
                Fetching live scores...
            </div>
        </div>
    </div>

    <script>
        // ESPN API endpoints
        const ESPN_ENDPOINTS = {
            wnba: 'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/scoreboard',
            mlb: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard',
            'nba-sl': 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba-summer-las-vegas/scoreboard',
            'tennis-atp': 'https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard',
            'tennis-wta': 'https://site.api.espn.com/apis/site/v2/sports/tennis/wta/scoreboard'
        };

        let matchData = {};
        let activeSport = "all";
        let activeFilter = "all";
        let showOdds = true;

        function toggleOdds() {
            showOdds = !showOdds;
            document.getElementById('oddsSwitch').classList.toggle('active', showOdds);
            renderMatches();
        }

        // --- DATA FETCHING ---

        async function fetchJSON(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        function parseStatus(status) {
            const state = status.type.state;
            if (state === 'in') return 'live';
            if (state === 'post') return 'finished';
            return 'upcoming';
        }

        function parseOdds(competition) {
            if (!competition.odds || competition.odds.length === 0) return null;

            const odds = competition.odds[0];
            const result = {
                source: odds.provider ? odds.provider.name : 'DraftKings',
                spread: odds.spread,
                overUnder: odds.overUnder,
                details: odds.details
            };

            if (odds.moneyline) {
                result.moneyline = {
                    home: odds.moneyline.home && odds.moneyline.home.close ? odds.moneyline.home.close.odds : null,
                    away: odds.moneyline.away && odds.moneyline.away.close ? odds.moneyline.away.close.odds : null
                };
            }

            if (odds.pointSpread) {
                result.pointSpread = {
                    home: {
                        line: odds.pointSpread.home && odds.pointSpread.home.close ? odds.pointSpread.home.close.line : odds.spread,
                        odds: odds.pointSpread.home && odds.pointSpread.home.close ? odds.pointSpread.home.close.odds : null
                    },
                    away: {
                        line: odds.pointSpread.away && odds.pointSpread.away.close ? odds.pointSpread.away.close.line : (odds.spread ? -odds.spread : null),
                        odds: odds.pointSpread.away && odds.pointSpread.away.close ? odds.pointSpread.away.close.odds : null
                    }
                };
            }

            if (odds.total) {
                result.total = {
                    over: {
                        line: odds.total.over && odds.total.over.close ? odds.total.over.close.line : odds.overUnder,
                        odds: odds.total.over && odds.total.over.close ? odds.total.over.close.odds : null
                    },
                    under: {
                        line: odds.total.under && odds.total.under.close ? odds.total.under.close.line : odds.overUnder,
                        odds: odds.total.under && odds.total.under.close ? odds.total.under.close.odds : null
                    }
                };
            }

            return result;
        }

        function parseBasketballGame(event) {
            const comp = event.competitions[0];
            const status = comp.status;
            const state = parseStatus(status);

            const home = comp.competitors.find(c => c.homeAway === 'home');
            const away = comp.competitors.find(c => c.homeAway === 'away');

            let timeDisplay = '';
            if (state === 'live') {
                timeDisplay = status.type.shortDetail || status.type.detail || '';
            } else if (state === 'finished') {
                timeDisplay = 'Final';
            } else {
                const d = new Date(event.date);
                timeDisplay = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            }

            return {
                status: state,
                time: timeDisplay,
                home: home.team.displayName,
                away: away.team.displayName,
                homeLogo: home.team.logo || '',
                awayLogo: away.team.logo || '',
                homeScore: state === 'upcoming' ? '-' : home.score,
                awayScore: state === 'upcoming' ? '-' : away.score,
                isLive: state === 'live',
                homeWin: state === 'finished' && home.winner,
                awayWin: state === 'finished' && away.winner,
                odds: parseOdds(comp)
            };
        }

        function parseMLBGame(event) {
            const comp = event.competitions[0];
            const status = comp.status;
            const state = parseStatus(status);

            const home = comp.competitors.find(c => c.homeAway === 'home');
            const away = comp.competitors.find(c => c.homeAway === 'away');

            let timeDisplay = '';
            if (state === 'live') {
                timeDisplay = status.type.shortDetail || status.type.detail || '';
            } else if (state === 'finished') {
                timeDisplay = 'Final';
            } else {
                const d = new Date(event.date);
                timeDisplay = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            }

            const match = {
                status: state,
                time: timeDisplay,
                home: home.team.displayName,
                away: away.team.displayName,
                homeLogo: home.team.logo || '',
                awayLogo: away.team.logo || '',
                homeScore: state === 'upcoming' ? '-' : home.score,
                awayScore: state === 'upcoming' ? '-' : away.score,
                isLive: state === 'live',
                homeWin: state === 'finished' && home.winner,
                awayWin: state === 'finished' && away.winner,
                odds: parseOdds(comp)
            };

            if (state === 'live' && comp.situation) {
                match.bases = [
                    !!comp.situation.onFirst,
                    !!comp.situation.onSecond,
                    !!comp.situation.onThird
                ];
                match.outs = comp.situation.outs || 0;
            }

            return match;
        }

        function parseTennisData(data) {
            const matches = [];
            if (!data.events) return matches;

            data.events.forEach(event => {
                const tournamentName = event.name || 'Tournament';
                const groupings = event.groupings || [];

                groupings.forEach(grouping => {
                    if (grouping.grouping && grouping.grouping.slug && grouping.grouping.slug.includes('doubles')) return;

                    const competitions = grouping.competitions || [];
                    competitions.forEach(comp => {
                        const status = comp.status;
                        const state = parseStatus(status);
                        const competitors = comp.competitors || [];
                        if (competitors.length < 2) return;

                        const p1 = competitors[0];
                        const p2 = competitors[1];

                        const p1Name = p1.athlete ? p1.athlete.shortName || p1.athlete.displayName : 'TBD';
                        const p2Name = p2.athlete ? p2.athlete.shortName || p2.athlete.displayName : 'TBD';

                        const p1Sets = (p1.linescores || []).map(s => Math.round(s.value));
                        const p2Sets = (p2.linescores || []).map(s => Math.round(s.value));

                        let timeDisplay = '';
                        if (state === 'live') {
                            const setNum = p1Sets.length;
                            timeDisplay = setNum > 0 ? `Set ${setNum}` : 'Live';
                        } else if (state === 'finished') {
                            timeDisplay = 'Finished';
                        } else {
                            const d = new Date(comp.startDate || comp.date);
                            timeDisplay = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                        }

                        const round = comp.round ? comp.round.displayName : '';

                        matches.push({
                            status: state,
                            time: timeDisplay,
                            home: p1Name,
                            away: p2Name,
                            isLive: state === 'live',
                            isTennis: true,
                            homeSets: p1Sets,
                            awaySets: p2Sets,
                            homeWin: state === 'finished' && p1.winner,
                            awayWin: state === 'finished' && p2.winner,
                            tournament: `${tournamentName}${round ? ' - ' + round : ''}`,
                            odds: null
                        });
                    });
                });
            });

            return matches;
        }

        async function fetchWNBA() {
            try {
                const data = await fetchJSON(ESPN_ENDPOINTS.wnba);
                matchData.wnba = {
                    league: 'WNBA',
                    country: 'USA',
                    icon: '&#127936;',
                    matches: (data.events || []).map(parseBasketballGame)
                };
            } catch (e) {
                matchData.wnba = { league: 'WNBA', country: 'USA', icon: '&#127936;', matches: [], error: e.message };
            }
        }

        async function fetchMLB() {
            try {
                const data = await fetchJSON(ESPN_ENDPOINTS.mlb);
                matchData.mlb = {
                    league: 'MLB',
                    country: 'USA',
                    icon: '&#9918;',
                    matches: (data.events || []).map(parseMLBGame)
                };
            } catch (e) {
                matchData.mlb = { league: 'MLB', country: 'USA', icon: '&#9918;', matches: [], error: e.message };
            }
        }

        async function fetchNBASummerLeague() {
            try {
                const data = await fetchJSON(ESPN_ENDPOINTS['nba-sl']);
                matchData['nba-sl'] = {
                    league: 'NBA Summer League',
                    country: 'Las Vegas',
                    icon: '&#127936;',
                    matches: (data.events || []).map(parseBasketballGame)
                };
            } catch (e) {
                matchData['nba-sl'] = { league: 'NBA Summer League', country: 'Las Vegas', icon: '&#127936;', matches: [], error: e.message };
            }
        }

        async function fetchTennis() {
            try {
                const [atpData, wtaData] = await Promise.all([
                    fetchJSON(ESPN_ENDPOINTS['tennis-atp']),
                    fetchJSON(ESPN_ENDPOINTS['tennis-wta'])
                ]);

                const allMatches = [...parseTennisData(atpData), ...parseTennisData(wtaData)];
                allMatches.sort((a, b) => {
                    const order = { live: 0, upcoming: 1, finished: 2 };
                    return (order[a.status] || 0) - (order[b.status] || 0);
                });

                matchData.tennis = {
                    league: 'ATP / WTA Tour',
                    country: 'International',
                    icon: '&#127934;',
                    matches: allMatches
                };
            } catch (e) {
                matchData.tennis = { league: 'ATP / WTA Tour', country: 'International', icon: '&#127934;', matches: [], error: e.message };
            }
        }

        async function fetchAllData() {
            renderLoading();
            await Promise.all([fetchWNBA(), fetchMLB(), fetchNBASummerLeague(), fetchTennis()]);
            renderMatches();
            updateTime();
        }

        // --- RENDERING ---

        function renderLoading() {
            document.getElementById('matchContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Fetching live scores...
                </div>
            `;
        }

        function renderMatches() {
            const container = document.getElementById("matchContainer");
            container.innerHTML = "";

            const sportsToShow = activeSport === "all"
                ? Object.keys(matchData)
                : [activeSport];

            let totalVisible = 0;

            sportsToShow.forEach(sportKey => {
                const sport = matchData[sportKey];
                if (!sport) return;

                if (sport.error && sport.matches.length === 0) {
                    container.innerHTML += `<div class="error-msg">Failed to load ${sport.league}: ${sport.error}</div>`;
                    return;
                }

                const filteredMatches = activeFilter === "all"
                    ? sport.matches
                    : sport.matches.filter(m => m.status === activeFilter);

                if (filteredMatches.length === 0) return;

                totalVisible += filteredMatches.length;

                const tournamentGroups = {};
                filteredMatches.forEach(match => {
                    const key = match.tournament || sport.league;
                    if (!tournamentGroups[key]) tournamentGroups[key] = [];
                    tournamentGroups[key].push(match);
                });

                Object.entries(tournamentGroups).forEach(([tournament, matches]) => {
                    const group = document.createElement("div");
                    group.className = "section";

                    group.innerHTML = `
                        <div class="section-header">
                            <div class="league-icon">${sport.icon}</div>
                            <div class="league-name">${tournament}</div>
                            <div class="league-country">${sport.country}</div>
                        </div>
                        <div class="match-list">
                            ${matches.map(match => renderMatchRow(match, sportKey)).join("")}
                        </div>
                    `;

                    container.appendChild(group);
                });
            });

            if (totalVisible === 0) {
                container.innerHTML += `<div class="no-matches">No matches found for this filter</div>`;
            }

            updateCounts();
        }

        function renderMatchRow(match, sportKey) {
            const statusClass = match.status;
            const statusText = match.isLive
                ? `<span class="live-badge">LIVE</span><div class="status-time">${match.time}</div>`
                : match.status === "finished"
                    ? "FT"
                    : match.time;

            if (match.isTennis) {
                return renderTennisRow(match, statusClass, statusText);
            }

            if (sportKey === "mlb" && match.isLive && match.bases) {
                return renderMLBRow(match, statusClass, statusText);
            }

            const homeLogoHTML = match.homeLogo ? `<img class="team-logo" src="${match.homeLogo}" alt="" onerror="this.style.display='none'">` : '';
            const awayLogoHTML = match.awayLogo ? `<img class="team-logo" src="${match.awayLogo}" alt="" onerror="this.style.display='none'">` : '';
            const oddsHTML = renderOddsCell(match);

            return `
                <div class="match-row" data-status="${match.status}">
                    <div class="match-status ${statusClass}">${statusText}</div>
                    <div class="match-teams">
                        <div class="team-row">
                            ${homeLogoHTML}
                            <span class="team-name ${match.homeWin ? 'winner' : ''}">${match.home}</span>
                        </div>
                        <div class="team-row">
                            ${awayLogoHTML}
                            <span class="team-name ${match.awayWin ? 'winner' : ''}">${match.away}</span>
                        </div>
                    </div>
                    <div class="match-scores">
                        <span class="score ${match.isLive ? 'live-score' : ''}">${match.homeScore}</span>
                        <span class="score ${match.isLive ? 'live-score' : ''}">${match.awayScore}</span>
                    </div>
                    ${oddsHTML}
                </div>
            `;
        }

        function renderTennisRow(match, statusClass, statusText) {
            const homeSetHTML = match.homeSets.map((s, i) => {
                const isLast = i === match.homeSets.length - 1 && match.isLive;
                const won = !match.isLive && s > (match.awaySets[i] || 0);
                return `<span class="set-score ${isLast ? 'current' : ''} ${won ? 'won' : ''}">${s}</span>`;
            }).join("");

            const awaySetHTML = match.awaySets.map((s, i) => {
                const isLast = i === match.awaySets.length - 1 && match.isLive;
                const won = !match.isLive && s > (match.homeSets[i] || 0);
                return `<span class="set-score ${isLast ? 'current' : ''} ${won ? 'won' : ''}">${s}</span>`;
            }).join("");

            return `
                <div class="match-row" data-status="${match.status}">
                    <div class="match-status ${statusClass}">${statusText}</div>
                    <div class="match-teams">
                        <div class="team-row">
                            <span class="team-name ${match.homeWin ? 'winner' : ''}">${match.home}</span>
                        </div>
                        <div class="team-row">
                            <span class="team-name ${match.awayWin ? 'winner' : ''}">${match.away}</span>
                        </div>
                    </div>
                    <div class="tennis-scores">
                        <div class="tennis-score-row">${homeSetHTML || '<span class="set-score">-</span>'}</div>
                        <div class="tennis-score-row">${awaySetHTML || '<span class="set-score">-</span>'}</div>
                    </div>
                </div>
            `;
        }

        function renderMLBRow(match, statusClass, statusText) {
            const basesHTML = match.bases ? `
                <span class="base-indicator">
                    <span class="base ${match.bases[0] ? 'occupied' : ''}"></span>
                    <span class="base ${match.bases[1] ? 'occupied' : ''}"></span>
                    <span class="base ${match.bases[2] ? 'occupied' : ''}"></span>
                </span>
            ` : "";

            const outsHTML = match.outs !== undefined ? `
                <span class="outs-indicator">
                    <span class="out-dot ${match.outs >= 1 ? 'active' : ''}"></span>
                    <span class="out-dot ${match.outs >= 2 ? 'active' : ''}"></span>
                </span>
            ` : "";

            const homeLogoHTML = match.homeLogo ? `<img class="team-logo" src="${match.homeLogo}" alt="" onerror="this.style.display='none'">` : '';
            const awayLogoHTML = match.awayLogo ? `<img class="team-logo" src="${match.awayLogo}" alt="" onerror="this.style.display='none'">` : '';
            const oddsHTML = renderOddsCell(match);

            return `
                <div class="match-row" data-status="${match.status}">
                    <div class="match-status ${statusClass}">
                        ${statusText}
                        <div style="margin-top:4px">${basesHTML}${outsHTML}</div>
                    </div>
                    <div class="match-teams">
                        <div class="team-row">
                            ${homeLogoHTML}
                            <span class="team-name">${match.home}</span>
                        </div>
                        <div class="team-row">
                            ${awayLogoHTML}
                            <span class="team-name">${match.away}</span>
                        </div>
                    </div>
                    <div class="match-scores">
                        <span class="score live-score">${match.homeScore}</span>
                        <span class="score live-score">${match.awayScore}</span>
                    </div>
                    ${oddsHTML}
                </div>
            `;
        }

        function renderOddsCell(match) {
            if (!showOdds || !match.odds || match.status === 'finished') return '';

            const odds = match.odds;
            let html = '<div class="match-odds">';

            // Moneyline
            if (odds.moneyline && (odds.moneyline.home || odds.moneyline.away)) {
                const homeML = odds.moneyline.home;
                const awayML = odds.moneyline.away;
                const homeClass = homeML && parseInt(homeML) < 0 ? 'favorite' : 'underdog';
                const awayClass = awayML && parseInt(awayML) < 0 ? 'favorite' : 'underdog';
                html += `
                    <div class="odds-group">
                        <span class="odds-label">ML</span>
                        <div class="odds-pair">
                            <div class="odds-cell ${homeClass}">${formatOddsVal(homeML)}</div>
                            <div class="odds-cell ${awayClass}">${formatOddsVal(awayML)}</div>
                        </div>
                    </div>
                `;
            }

            // Spread
            if (odds.pointSpread && odds.pointSpread.home) {
                const homeLine = odds.pointSpread.home.line;
                const awayLine = odds.pointSpread.away ? odds.pointSpread.away.line : (homeLine ? -homeLine : null);
                html += `
                    <div class="odds-group">
                        <span class="odds-label">Spread</span>
                        <div class="odds-pair">
                            <div class="odds-cell"><span class="odds-point">${formatSpread(homeLine)}</span>${formatOddsVal(odds.pointSpread.home.odds)}</div>
                            <div class="odds-cell"><span class="odds-point">${formatSpread(awayLine)}</span>${formatOddsVal(odds.pointSpread.away ? odds.pointSpread.away.odds : null)}</div>
                        </div>
                    </div>
                `;
            } else if (odds.spread) {
                html += `
                    <div class="odds-group">
                        <span class="odds-label">Spread</span>
                        <div class="odds-pair">
                            <div class="odds-cell">${formatSpread(odds.spread)}</div>
                            <div class="odds-cell">${formatSpread(-odds.spread)}</div>
                        </div>
                    </div>
                `;
            }

            // Over/Under
            if (odds.total && odds.total.over) {
                html += `
                    <div class="odds-group">
                        <span class="odds-label">O/U ${odds.total.over.line || odds.overUnder}</span>
                        <div class="odds-pair">
                            <div class="odds-cell">O ${formatOddsVal(odds.total.over.odds)}</div>
                            <div class="odds-cell">U ${formatOddsVal(odds.total.under ? odds.total.under.odds : null)}</div>
                        </div>
                    </div>
                `;
            } else if (odds.overUnder) {
                html += `
                    <div class="odds-group">
                        <span class="odds-label">O/U</span>
                        <div class="odds-pair">
                            <div class="odds-cell">${odds.overUnder}</div>
                        </div>
                    </div>
                `;
            }

            html += `<div class="dk-badge">${odds.source}</div>`;
            html += '</div>';
            return html;
        }

        function formatOddsVal(val) {
            if (val === null || val === undefined) return '-';
            const num = parseInt(val);
            if (isNaN(num)) return val;
            return num > 0 ? `+${num}` : `${num}`;
        }

        function formatSpread(val) {
            if (val === null || val === undefined) return '-';
            const num = parseFloat(val);
            if (isNaN(num)) return val;
            return num > 0 ? `+${num}` : `${num}`;
        }

        function updateCounts() {
            let total = 0;
            Object.keys(matchData).forEach(key => {
                const count = matchData[key] ? matchData[key].matches.length : 0;
                total += count;
                const el = document.getElementById(`count-${key}`);
                if (el) el.textContent = count;
            });
            document.getElementById("count-all").textContent = total;
        }

        function updateTime() {
            const now = new Date();
            document.getElementById("lastUpdated").textContent =
                `Updated: ${now.toLocaleTimeString()}`;
        }

        // --- EVENT LISTENERS ---

        document.querySelectorAll(".sport-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".sport-tab").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                activeSport = tab.dataset.sport;
                renderMatches();
            });
        });

        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeFilter = btn.dataset.filter;
                renderMatches();
            });
        });

        // --- INIT & AUTO-REFRESH ---

        fetchAllData();
        setInterval(fetchAllData, 30000);
    </script>
</body>
</html>
